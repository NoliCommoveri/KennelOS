<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KennelOS Furever</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfaf8; --fg: #2a2620; --muted: #7a7267; --accent: #b06a4f; --card: #fff; --border: #ece7e0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1815; --fg: #efe9e1; --muted: #a49a8d; --accent: #d68a6e; --card: #232019; --border: #322d25; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid; place-items: center; padding: 1.5rem; text-align: center;
    }
    .card {
      max-width: 30rem; background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 2.5rem 2rem; box-shadow: 0 12px 40px rgba(0,0,0,.06);
    }
    .paw { font-size: 3rem; line-height: 1; }
    h1 { font-size: 1.6rem; margin: .75rem 0 .25rem; letter-spacing: -.01em; }
    .tag { color: var(--accent); font-weight: 600; margin: 0 0 1rem; }
    p { color: var(--muted); margin: .5rem 0 0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="paw" aria-hidden="true">🐾</div>
    <h1>KennelOS Furever</h1>
    <p class="tag">Your pup's care home, for years.</p>
    <p>We're getting things ready. Your breeder's link will open here soon.</p>
  </main>
</body>
</html>
