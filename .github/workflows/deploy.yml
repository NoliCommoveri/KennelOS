name: Deploy editions

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      # The editions are independent deploy targets (different repos, different
      # origins) — one failing must never cancel the others mid-publish. Without
      # this, GitHub's default fail-fast races a cancel signal against an in-flight
      # job — seen in practice: lite/pro's own steps (incl. Publish) showed
      # "success" while the job itself got stamped "cancelled". Kept on even though
      # only three legs remain, so a future re-added leg can't regress the others.
      fail-fast: false
      matrix:
        include:
          - edition: lite
            repo: NoliCommoveri/kennelos-lite
            domain: lite.kennelos.app
          - edition: pro
            repo: NoliCommoveri/kennelos-pro
            domain: pro.kennelos.app
          - edition: demo
            repo: NoliCommoveri/kennelos-demo
            domain: demo.kennelos.app
          # Furever is a standalone app (not an edition of the shared core);
          # assemble.mjs still builds it off furever/ via its standalone path, but
          # its deploy leg is DISABLED here because EDITIONS_DEPLOY_PAT lacks push
          # access to NoliCommoveri/KennelOS-Furever (403 on publish — the known gap
          # in docs/LAUNCH_CHECKLIST.md §3). Re-add this entry once the PAT is
          # granted write access to that repo.
          # - edition: furever
          #   repo: NoliCommoveri/KennelOS-Furever
          #   domain: furever.kennelos.app
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build ${{ matrix.edition }}
        # TEMPORARY: --release removed so lite/pro/demo can deploy for live testing
        # before the real launch URLs are in hand (docs/LAUNCH_CHECKLIST.md §1 is
        # still open — lite's upgradeUrl / pro's licenseConfig.checkoutUrl are still
        # placeholders). A plain build only WARNS on those, it doesn't fail, so this
        # ships a dead Upgrade/checkout link for now. Put --release back the moment
        # the checklist's §1 swaps land, before any real user traffic.
        run: node build/assemble.mjs ${{ matrix.edition }}

      - name: Add CNAME
        run: echo "${{ matrix.domain }}" > dist/${{ matrix.edition }}/CNAME

      - name: Publish to ${{ matrix.repo }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.EDITIONS_DEPLOY_PAT }}
          external_repository: ${{ matrix.repo }}
          publish_branch: main
          publish_dir: dist/${{ matrix.edition }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ matrix.edition }}: ${{ github.sha }}'
